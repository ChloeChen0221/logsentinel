services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: logsentinel-postgres
    environment:
      POSTGRES_USER: logsentinel
      POSTGRES_PASSWORD: logsentinel
      POSTGRES_DB: logsentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logsentinel -d logsentinel"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logsentinel-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: logsentinel-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logsentinel-net

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logsentinel-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://logsentinel:logsentinel@postgres:5432/logsentinel
      - REDIS_URL=redis://redis:6379/0
      - LOKI_URL=http://host.docker.internal:3100
      - ENGINE_INTERVAL_SECONDS=30
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:80","http://frontend:80"]
    # 启动顺序：先跑 alembic 迁移，再用 gunicorn 启动多进程 uvicorn workers（生产对齐）
    command: ["sh", "-c", "alembic upgrade head && gunicorn main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 60"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logsentinel-net

  # 规则引擎 Worker
  engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logsentinel-engine
    command: ["python", "-m", "engine.worker"]
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://logsentinel:logsentinel@postgres:5432/logsentinel
      - REDIS_URL=redis://redis:6379/0
      - LOKI_URL=http://host.docker.internal:3102
      - ENGINE_INTERVAL_SECONDS=30
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'engine.worker' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - logsentinel-net

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logsentinel-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logsentinel-net

networks:
  logsentinel-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
