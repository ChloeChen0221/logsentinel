# 生产环境 override：对齐压测预期（§17.4 100 条告警规模）
api:
  replicas: 2
  workers: 4
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

engine:
  replicas: 3
  concurrency: 20
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

frontend:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

postgresql:
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

redis:
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

loki:
  singleBinary:
    persistence:
      enabled: true
      size: 20Gi
