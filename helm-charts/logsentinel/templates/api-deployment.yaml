{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logsentinel.fullname" . }}-api
  labels:
    {{- include "logsentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "logsentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "logsentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Alembic 迁移在 initContainer 执行，多 API 副本下只第一个抢到 schema 锁
      initContainers:
        - name: alembic-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.global.imagePullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            {{- include "logsentinel.commonEnv" . | nindent 12 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.global.imagePullPolicy }}
          command:
            - "gunicorn"
            - "main:app"
            - "-k"
            - "uvicorn.workers.UvicornWorker"
            - "-w"
            - {{ .Values.api.workers | quote }}
            - "-b"
            - "0.0.0.0:8000"
            - "--timeout"
            - "60"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "logsentinel.commonEnv" . | nindent 12 }}
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
