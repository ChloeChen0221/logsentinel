{{- /*
可选 Secret，用于未来将 DATABASE_URL / REDIS_URL 从 values 明文下沉到 Secret。
当前 P1 阶段直接由 _helpers.tpl 从 values 渲染到 Deployment env，保持简单。
开启方式：在 values.yaml 设置 `app.secret.create: true`
*/ -}}
{{- if (.Values.app | default dict).secret | default dict | dig "create" false -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logsentinel.fullname" . }}
  labels:
    {{- include "logsentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "logsentinel.databaseUrl" . | quote }}
  REDIS_URL: {{ include "logsentinel.redisUrl" . | quote }}
{{- end }}
