# Loki Helm Chart Values for Minikube
# Optimized for local development and testing

loki:
  # Disable authentication for local development
  auth_enabled: false
  
  # Common configuration
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki
  
  # Storage configuration
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  
  # Schema configuration
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  
  # Ingester configuration
  ingester:
    chunk_idle_period: 3m
    chunk_block_size: 262144
    chunk_retain_period: 1m
    lifecycler:
      ring:
        replication_factor: 1
  
  # Query limits
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_cache_freshness_per_query: 10m
    split_queries_by_interval: 15m
    max_query_parallelism: 32
    max_entries_limit_per_query: 5000
    max_streams_per_user: 0
    max_global_streams_per_user: 0
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    per_stream_rate_limit: 3MB
    per_stream_rate_limit_burst: 15MB
    # Enable structured metadata
    allow_structured_metadata: true
    # Enable volume endpoints
    volume_enabled: true
  
  # Compactor configuration
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem
  
  # Ruler configuration
  ruler:
    enable_api: true
    storage:
      type: local
      local:
        directory: /var/loki/rules
  
  # Pattern ingester
  pattern_ingester:
    enabled: true

# Deployment mode: SingleBinary for simplicity
deploymentMode: SingleBinary

# Single binary configuration
singleBinary:
  replicas: 1
  
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Persistent storage
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard
  
  # Extra environment variables
  extraEnv:
    - name: TZ
      value: UTC

# Disable other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Gateway configuration (nginx)
gateway:
  enabled: true
  replicas: 1
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
  
  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  
  # Ingress configuration (disabled for Minikube)
  ingress:
    enabled: false

# MinIO disabled (using filesystem)
minio:
  enabled: false

# Monitoring configuration
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  
  lokiCanary:
    enabled: false

# Test configuration
test:
  enabled: false
